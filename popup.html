<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body { width: 460px; min-height: 320px; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background: #f7f8fa; color: #333; overflow: hidden }

.header { padding: 12px 16px; background: #409eff; color: #fff; display: flex; align-items: center; justify-content: space-between }
.header h1 { font-size: 15px; font-weight: 600 }
.header .badge { background: rgba(255,255,255,0.25); padding: 2px 8px; border-radius: 10px; font-size: 12px }

.panel { padding: 12px 16px }
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px }
.toolbar .actions { display: flex; gap: 6px }
.page-url { font-size: 12px; color: #909399 }

.media-list { max-height: 420px; overflow-y: auto }
.media-item { background: #fff; border: 1px solid #ebeef5; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; transition: border-color .16s ease, box-shadow .16s ease }
.media-item.expanded { border-color: #bfdcff; box-shadow: 0 0 0 1px rgba(64,158,255,.1) }
.media-item .row { display: flex; align-items: center; justify-content: space-between; gap: 8px }
.media-item .filename { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.media-item .meta { font-size: 11px; color: #909399; margin-top: 4px }
.media-item .meta span { margin-right: 10px }
.thumb { width: 42px; height: 42px; object-fit: cover; border-radius: 4px; border: 1px solid #dcdfe6; cursor: zoom-in; flex-shrink: 0; background: #f5f7fa }
.row-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0 }

.tabs { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 2px }
.tab-btn { border: 1px solid #dcdfe6; background: #fff; color: #606266; border-radius: 14px; font-size: 12px; padding: 3px 10px; cursor: pointer; white-space: nowrap }
.tab-btn.active { background: #409eff; border-color: #409eff; color: #fff }
.tab-btn:disabled { background: #f5f7fa; color: #c0c4cc; border-color: #ebeef5; cursor: not-allowed }

.tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 500 }
.tag.audio { background: #ecf5ff; color: #409eff }
.tag.video { background: #fdf6ec; color: #e6a23c }
.tag.image { background: #f0f9eb; color: #67c23a }
.tag.other { background: #f4f4f5; color: #909399 }
.tag.stream { background: #fef0f0; color: #f56c6c }
.tag.status { background: #eef6ff; color: #2d70b3 }
.tag.status.analyzed { background: #ecf5ff; color: #409eff }
.tag.status.exported { background: #fdf6ec; color: #d48806 }
.tag.status.downloaded { background: #f0f9eb; color: #3f8f2e }
.tag.status.failed { background: #fef0f0; color: #d85a5a }

.btn-sm { padding: 4px 10px; font-size: 11px; background: #f0f2f5; border: 1px solid #dcdfe6; border-radius: 4px; cursor: pointer; color: #606266 }
.btn-sm:hover { background: #e4e7ed }
.btn-dl { padding: 4px 12px; font-size: 12px; background: #409eff; color: #fff; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap }
.btn-dl:hover { background: #337ecc }
.btn-alt { padding: 4px 10px; font-size: 11px; background: #fff; color: #606266; border: 1px solid #dcdfe6; border-radius: 4px; cursor: pointer; white-space: nowrap }
.btn-alt:hover { background: #f5f7fa }
.btn-alt:disabled { opacity: 0.55; cursor: wait }

.empty { text-align: center; padding: 40px 0; color: #909399; font-size: 13px }
.settings { display: none; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap }
.settings.show { display: flex }
.settings-label { font-size: 12px; color: #606266; font-weight: 600 }
.sw { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #606266; background: #fff; border: 1px solid #e4e7ed; padding: 3px 8px; border-radius: 12px }
.sw input { margin: 0 }

.status-note { display: none; margin-bottom: 10px; padding: 8px 10px; background: #eef6ff; color: #315b8a; border: 1px solid #c8def8; border-radius: 6px; font-size: 12px; line-height: 1.4 }
.status-note[data-tone="warn"] { background: #fdf6ec; color: #b88230; border-color: #f5dab1 }
.status-note[data-tone="error"] { background: #fef0f0; color: #c45656; border-color: #fbc4c4 }
.status-note[data-tone="success"] { background: #f0f9eb; color: #4e8a2f; border-color: #cde7b9 }

.note { margin-top: 6px; font-size: 11px; color: #e6a23c; line-height: 1.4 }
.context-note { margin-top: 6px; font-size: 11px; color: #8b6a26; line-height: 1.4 }
.stream-tools { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap }
.stream-summary { margin-top: 8px; padding: 8px 10px; background: #f5f7fa; border: 1px solid #ebeef5; border-radius: 6px; font-size: 11px; color: #606266; line-height: 1.5 }
.stream-title { font-weight: 600; color: #303133; margin-bottom: 2px }
.details-panel { margin-top: 10px; padding-top: 10px; border-top: 1px solid #ebeef5; display: flex; flex-direction: column; gap: 10px }
.detail-actions { display: flex; gap: 6px; flex-wrap: wrap }
.detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px }
.detail-field { background: #f7f9fc; border: 1px solid #ebeef5; border-radius: 6px; padding: 8px 9px; min-width: 0 }
.detail-field.wide { grid-column: 1 / -1 }
.detail-label { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: #909399; margin-bottom: 4px }
.detail-value { font-size: 12px; color: #303133; line-height: 1.45; word-break: break-word; white-space: pre-wrap }
.detail-value.mono { font-family: Consolas, "SFMono-Regular", monospace; font-size: 11px }
.analysis-panel { display: flex; flex-direction: column; gap: 8px }
.analysis-card { background: #fff; border: 1px solid #ebeef5; border-radius: 6px; padding: 8px 10px }
.analysis-title { font-size: 11px; font-weight: 600; color: #303133; margin-bottom: 6px }
.analysis-item { padding: 6px 0; border-top: 1px dashed #ebeef5 }
.analysis-item:first-child { border-top: none; padding-top: 0 }
.analysis-main { font-size: 12px; color: #303133; word-break: break-word }
.analysis-sub { font-size: 11px; color: #909399; margin-top: 2px; line-height: 1.4; word-break: break-word }
.analysis-empty { font-size: 11px; color: #909399; line-height: 1.5 }

.sort-select { padding: 4px 6px; font-size: 11px; border: 1px solid #dcdfe6; border-radius: 4px; background: #fff; color: #606266; cursor: pointer; margin-left: auto }

.batch-bar { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; flex-wrap: wrap }
.batch-bar .batch-label { font-size: 11px; color: #909399; white-space: nowrap }
.platform-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 600; background: #f0f2f5; color: #606266; letter-spacing: .02em }

.preview-mask { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px }
.preview-mask.show { display: flex }
.preview-img { max-width: min(90vw, 980px); max-height: 85vh; border-radius: 8px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,.35) }

@media (max-width: 520px) {
  body { width: 100%; min-width: 0 }
  .detail-grid { grid-template-columns: 1fr }
}
</style>
</head>
<body>
<div class="header">
  <h1>媒体嗅探器</h1>
  <span class="badge" id="countBadge">0 个资源</span>
</div>

<div class="panel">
  <div class="toolbar">
    <span class="page-url" id="pageUrl">当前页面</span>
    <div class="actions">
      <button class="btn-sm" id="btnSettings" title="抓取设置">设置</button>
      <button class="btn-sm" id="btnPin" title="把面板固定到当前页面">钉住</button>
      <button class="btn-sm" id="btnClear" title="清空当前捕获结果">清空</button>
    </div>
  </div>

  <div class="settings" id="settingsPanel">
    <span class="settings-label">抓取：</span>
    <label class="sw"><input type="checkbox" id="setVideo" checked />视频</label>
    <label class="sw"><input type="checkbox" id="setImage" checked />图片</label>
    <label class="sw"><input type="checkbox" id="setAudio" checked />音频</label>
    <label class="sw"><input type="checkbox" id="setOther" checked />其他</label>
  </div>

  <div class="status-note" id="statusNote" data-tone="info"></div>
  <div class="tabs" id="tabs"></div>
  <div class="batch-bar" id="batchBar" style="display:none">
    <span class="batch-label" id="batchLabel">批量：</span>
    <button class="btn-alt" id="btnBatchUrls">复制全部 URL</button>
    <button class="btn-alt" id="btnBatchFfmpeg">复制全部 ffmpeg</button>
    <button class="btn-alt" id="btnBatchDownload">全部下载</button>
    <select class="sort-select" id="sortSelect">
      <option value="time">按时间</option>
      <option value="size">按大小</option>
      <option value="name">按名称</option>
      <option value="platform">按平台</option>
    </select>
  </div>
  <div class="media-list" id="mediaList"></div>

  <div class="empty" id="emptyTip">
    <p>暂未捕获到媒体资源。</p>
    <p style="font-size:11px;color:#c0c4cc;margin-top:4px">打开包含音频、视频、图片或流媒体的页面，并让资源实际加载出来。</p>
  </div>
</div>

<div class="preview-mask" id="imgPreviewMask">
  <img class="preview-img" id="imgPreview" alt="preview" />
</div>
<script src="shared.js"></script>
<script src="popup.js"></script>
</body>
</html>
